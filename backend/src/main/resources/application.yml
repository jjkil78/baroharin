spring:
  application:
    name: baroharin
  datasource:
    url: jdbc:h2:file:./data/baroharin;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
    open-in-view: false
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      encoding: UTF-8
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET:kb-pay-baroharin-demo-secret-key-please-change-in-production-2026}
    expiration-ms: 86400000  # 24h
  initial-balance: 0
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.security: info
